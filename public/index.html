<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADX Download · 舞萌谱面下载站</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <header class="site-header">
      <div class="header-inner">
        <a href="#/" class="brand">
          <span class="brand-title">ADX Download</span>
          <span class="brand-sub">舞萌 DX 谱面下载站</span>
        </a>
        <div class="header-search" id="header-search-wrap">
          <input type="search" id="global-search" placeholder="搜索曲名、艺术家、版本…" autocomplete="off" />
        </div>
        <button type="button" class="btn btn-ghost" id="about-btn">关于</button>
      </div>
    </header>

    <main class="main" id="main"></main>

    <dialog id="about-dialog">
      <div class="dialog-content">
        <h2>关于 ADX Download</h2>
        <p>将谱面文件放入 <code>files/版本文件夹/</code> 即可自动出现在列表中。</p>
        <p>支持在文件夹内添加 <code>manifest.json</code> 填写曲名、艺术家、难度等元数据；也可使用文件名格式：<code>曲名_难度_定数.zip</code></p>
        <button type="button" class="btn btn-primary" id="close-about">关闭</button>
      </div>
    </dialog>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
